      window.addEventListener('load', function () {
        console.log('[SCF-iframe] Window load event fired');
        const image = document.getElementById('image-source');
        console.log('[SCF-iframe] image element found:', !!image);
        if (image) {
          console.log('[SCF-iframe] image.complete:', image.complete);
          console.log('[SCF-iframe] image.naturalWidth:', image.naturalWidth);
          console.log('[SCF-iframe] image.naturalHeight:', image.naturalHeight);
          console.log('[SCF-iframe] image.src:', image.src ? image.src.substring(0, 100) + '...' : 'empty');
        }
        image.classList.add('image-loaded');
        // Post the loaded image dimensions to the parent so it can resize
        // the iframe container to exactly match, preventing white gaps.
        const messagePayload = {
          type: 'bard-iframe-image-dimensions',
          width: image.naturalWidth,
          height: image.naturalHeight,
        };
        console.log('[SCF-iframe] Attempting postMessage with payload:', JSON.stringify(messagePayload));

        // Try window.top first (might fail cross-origin)
        try {
          console.log('[SCF-iframe] Trying window.top.postMessage...');
          window.top.postMessage(messagePayload, '*');
          console.log('[SCF-iframe] window.top.postMessage succeeded');
        } catch (e) {
          console.warn('[SCF-iframe] window.top.postMessage FAILED:', e.message);
        }

        // Also try window.parent in case we are nested inside SCF shim
        try {
          if (window.parent !== window.top) {
            console.log('[SCF-iframe] window.parent !== window.top, also trying window.parent.postMessage...');
            window.parent.postMessage(messagePayload, '*');
            console.log('[SCF-iframe] window.parent.postMessage succeeded');
          } else {
            console.log('[SCF-iframe] window.parent === window.top, skipping duplicate postMessage');
          }
        } catch (e) {
          console.warn('[SCF-iframe] window.parent.postMessage FAILED:', e.message);
        }
      });
